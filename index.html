<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/favicon.png">
    <title>Gerador de AR - Alpha Integrado</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-app: #f8fafc;
            --bg-sidebar: #0f172a;
            --sidebar-item: #1e293b;
            --accent: #38bdf8;
            --btn-primary: #0284c7;
            --btn-primary-hover: #0369a1;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-grid: #e2e8f0;
            --shadow-card: 0 10px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);

            /* Espaçamento do texto */
            --line-space-1: 0px;
            --block-space: 10px;
            --line-space-2: 0px;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            display: flex; background-color: var(--bg-app); height: 100vh; color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        
        .menu-toggle { display: none; }
        
        .sidebar { 
            width: 340px; min-width: 340px; height: 100%;
            background-color: var(--bg-sidebar); color: #ffffff; 
            padding: 30px 24px; display: flex; flex-direction: column; gap: 20px; 
            box-shadow: 4px 0 20px rgba(15, 23, 42, 0.15); z-index: 10;
            overflow-y: auto;
        }
        
        .sidebar-header > * { text-align: center; margin: 0; }
        .sidebar-header h1 { font-size: 20px; font-weight: 700; margin: 0; color: #fff; letter-spacing: -0.01em; }
        .sidebar-header span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 600; }
        
        .secao-card { background-color: var(--sidebar-item); border-radius: 4px; padding: 16px; border: 1px solid #334155; }
        .secao-card h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 12px 0; color: #cbd5e1; font-weight: 600; }
        .secao-card p.ajuda { font-size: 11px; color: #94a3b8; margin: 0; line-height: 1.4; }
        
        /* Drag & Drop Input */
        .file-container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; border: 2px dashed #475569; border-radius: 8px; padding: 15px 10px; cursor: pointer; transition: all 0.2s ease; }
        .file-container:hover { border-color: var(--accent); background: #131e35; }
        .file-container p { font-size: 12px; color: #94a3b8; margin: 8px 0 0 0; font-weight: 500; }
        .file-container input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        /* Sliders */
        .range-grupo { display: flex; flex-direction: column; gap: 12px; }
        .range-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #cbd5e1; }
        .range-val { font-size: 11px; background: #0f172a; padding: 2px 6px; border-radius: 4px; color: var(--accent); font-family: monospace; font-weight: bold; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 5px; background: #475569; border-radius: 9999px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #ffffff; border: 2px solid var(--accent); cursor: pointer; transition: transform 0.1s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        
        /* Botões */
        .btn-container { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s ease; }
        .btn:hover { transform: scale(101%); text-decoration: underline; }
        .btn-azul { background-color: var(--btn-primary); color: white; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.15); }
        .btn-azul:hover { background-color: var(--btn-primary-hover); }
        .btn-modelo { background-color: #334155; color: #e2e8f0; border: 1px solid #475569; }
        .btn-modelo:hover { background-color: #475569; color: #fff; }
        .btn-vermelho { background-color: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-vermelho:hover { background-color: #ef4444; color: white; border-color: #ef4444; }
        
        /* ÁREA DO CONTEÚDO */
        .viewer { 
            height: 100dvh;
            width: 100%;
            overflow-y: auto;
            padding: 40px;
            gap: 30px;
            
            /* flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165mm, 1fr)); 
            justify-items: center;
            align-content: start; */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* CONTAINER DO CARTÃO */
        .ar-container {
            background-color: #ffffff; border-radius: 6px; padding: 20px;
            box-shadow: var(--shadow-card); border: 1px solid var(--border-grid);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .ar-meta { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; width: 100%; text-align: left; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .ar-meta::before { content: ''; display: inline-block; width: 6px; height: 6px; background-color: #10b981; border-radius: 50%; }
        
        /* O CARD FÍSICO SIMULADO */
        .ar-card { 
            width: 186mm; height: 114mm; min-width: 186mm; min-height: 114mm; 
            background-color: #fffdf9; position: relative; border: 1.5px solid #cbd5e1; border-radius: 3px;

            overflow: hidden;
            background-image: url("assets/ar_bg.jpg");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        
        .bloco-texto { position: absolute; top: var(--top, 40mm); left: var(--left, 15mm); width: 135mm; font-size: var(--font-size, 16px); line-height: 1.45; color: #000; text-align: left; box-sizing: border-box; font-family: Arial, sans-serif; }
        .bloco-endereco { text-transform: uppercase; font-weight: bold; margin-bottom: 10px; }

        .nome, .endereco {
            margin-bottom: var(--line-space-1);
        }

        .bloco-endereco {
            margin-bottom: var(--block-space);
        }

        .infracao {
            margin-bottom: var(--line-space-2);
        }

        .infracao, .oficio {
            display: flex;
        }

        .valores {
            margin-left: 1em;
            font-weight: bold;
        }
        
        #download-link {
            color: var(--accent);
            text-decoration: underline;
            font-size: small;
        }

        /* AJUSTES CELULAR */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow: hidden; height: 100vh; }
            
            .menu-toggle {
                display: flex; align-items: center; justify-content: center; gap: 8px;
                width: 100%; background-color: var(--bg-sidebar); color: white;
                padding: 16px; border: none; font-size: 13px; font-weight: 600;
                position: relative; z-index: 20; cursor: pointer;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            }
            
            .sidebar { 
                width: 100%; min-width: 100%; height: auto; 
                max-height: 0; padding: 0 20px; overflow: hidden;
                position: absolute; top: 49px; left: 0;
                transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.4s ease;
                box-shadow: 0 15px 30px rgba(15, 23, 42, 0.25);
                
                opacity: 80%;
                overflow-y: scroll;
            }
            
            .sidebar.aberto { max-height: 85vh; padding: 24px 20px; border-bottom: 3px solid var(--accent); }
            .sidebar-header { display: none; }
            .btn-container { margin-top: 5px; flex-direction: column; gap: 8px; }
            .btn { padding: 12px; font-size: 12px; }
            
            .viewer { flex: 1; padding: 20px 12px; width: 100%; height: 100%; grid-template-columns: 1fr; gap: 20px; box-sizing: border-box; overflow-y: auto; overflow-x: auto;align-items: start; }
            .ar-container { padding: 12px; box-sizing: border-box; align-items: center;}
            .ar-card { transform: scale(0.72); transform-origin: top center; margin-bottom: -32mm; }
        }
        
        /* IMPRESSÃO */
        @media print {
            @page {
                size: portrait;
                margin: 0mm;
                size: 114mm 186mm;
            }
            .sidebar, .ar-meta, .menu-toggle { display: none !important; }
            body, .viewer { background: none; display: block; overflow: visible; padding: 0; width: auto; height: auto; }
            .ar-container { padding: 0; box-shadow: none; border: none; display: block; background: none; width: auto; overflow: visible; transform: none !important; }
            .ar-card { width: 114mm; height: 186mm; min-width: 114mm; min-height: 186mm; transform: none !important; margin-bottom: 0 !important; margin-top: 0 !important; page-break-after: always; margin: 0; box-shadow: none; border: none; position: relative; background: none; }
            .bloco-texto { top: var(--top, 40mm); left: calc(114mm - var(--top, 40mm)); width: 135mm; transform: rotate(90deg) !important; transform-origin: top left; display: block; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" onclick="toggleMenu()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        <span id="toggle-text">Configurações & Painel</span>
    </button>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Painel de Impressão</h1>
            <p><span>Gerador de AR Integrado</span></p>
        </div>
        
        <div class="secao-card">
            <h2>Fonte de Dados</h2>
            <div class="file-container" style="margin-bottom: 10px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <p id="file-label">Selecionar planilha</p>
                <input type="file" id="upload-excel" accept=".xlsx, .xls, .csv" />
            </div>
            <p class="ajuda">
                A ordem das colunas no Excel deve ser exatamente:
                <b>Nome, Endereço, Cidade/UF, CEP, Auto de Infração, Ofício</b>. <br>
                <a id="download-link" href="#" onclick="event.preventDefault(); baixarModeloExcel()">Baixar modelo</a>
            </p>
        </div>
        
        <div class="secao-card range-grupo">
            <h2>Alinhamento Global</h2>
            <div>
                <div class="range-meta">
                    <label>Eixo Vertical:</label>
                    <span class="range-val" id="val-top">?</span>
                </div>
                <input type="range" id="input-top" min="10" max="40" value="17">
            </div>
            <div>
                <div class="range-meta">
                    <label>Eixo Horizontal:</label>
                    <span class="range-val" id="val-left">?</span>
                </div>
                <input type="range" id="input-left" min="10" max="40" value="20">
            </div>
            <div>
                <div class="range-meta">
                    <label>Tamanho do Texto:</label>
                    <span class="range-val" id="val-font">?</span>
                </div>
                <input type="range" id="input-font" min="12" max="20" value="16">
            </div>
        </div>

        <div class="secao-card range-grupo">
            <h2>Alinhamento Fino</h2>
            <div>
                <div class="range-meta">
                    <label>Linhas (bloco 1):</label>
                    <span class="range-val" id="val-lines-1">?</span>
                </div>
                <input type="range" id="input-space-lines-1" min="0" max="40" value="5">
            </div>
            <div>
                <div class="range-meta">
                    <label>Blocos:</label>
                    <span class="range-val" id="val-block">?</span>
                </div>
                <input type="range" id="input-space-block" min="0" max="40" value="10">
            </div>
            <div>
                <div class="range-meta">
                    <label>Linhas (bloco 2):</label>
                    <span class="range-val" id="val-lines-2">?</span>
                </div>
                <input type="range" id="input-space-lines-2" min="0" max="40" value="5">
            </div>
        </div>
        
        <div class="btn-container">
            <button class="btn btn-azul" onclick="mandarImprimir()">
                Exportar
            </button>
            <button class="btn btn-vermelho" onclick="if (confirm('Deseja realmente limpar a edição atual?')) { limparDados() }">Limpar</button>
        </div>
    </div>
    
    <div class="viewer" id="viewer"></div>
    
    <script>
        document.getElementById('input-top').addEventListener('input', atualizar);
        document.getElementById('input-left').addEventListener('input', atualizar);
        document.getElementById('input-font').addEventListener('input', atualizar);
        document.getElementById("input-space-lines-1").addEventListener("input", atualizar);
        document.getElementById("input-space-block").addEventListener("input", atualizar);
        document.getElementById("input-space-lines-2").addEventListener("input", atualizar);

        const sidebar = document.getElementById('sidebar');
        const container = document.getElementById('viewer');
        const fileLabel = document.getElementById('file-label');
        const toggleText = document.getElementById('toggle-text');
        
        const htmlExemplo = `
            <div class="ar-container">
                <div class="ar-meta">Modo de Demonstração</div>
                <div class="ar-card">
                    <div class="bloco-texto">
                        <div class="bloco-endereco">
                            <div class="nome">
                                NOME DO DESTINATÁRIO DE EXEMPLO
                            </div>
                            <div class="endereco">
                                AVENIDA DUQUE DE CAXIAS, 1234 - RIBEIRA
                            </div>
                            <div class="cep">
                                NATAL, RN - CEP: 59012-000
                            </div>
                        </div>
                        <div class="bloco-infracao">
                            <div class="infracao">
                                <div class="campo">
                                    <b>Auto de Infração nº:</b>
                                </div>
                                <div class="valores">
                                    000000/2026 <br>
                                    000001/2026 <br>
                                    000002/2026 <br>
                                </div>
                            </div>
                            <div class="oficio">
                                <div class="campo">
                                    <b>Ofício GAC/CGD nº:</b>
                                </div>
                                <div class="valores">
                                    000/2026 <br>
                                    001/2026 <br>
                                    002/2026 <br>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        
        function toggleMenu() {
            sidebar.classList.toggle('aberto');
            toggleText.innerText = sidebar.classList.contains('aberto') ? "Fechar Painel e Ver ARs" : "Configurações & Painel";
        }
        
        function mandarImprimir() {
            sidebar.classList.remove('aberto');
            toggleText.innerText = "Configurações & Painel";
            setTimeout(() => { window.print(); }, 150);
        }
        
        function atualizar() {
            const topVal    = document.getElementById('input-top').value;
            const leftVal   = document.getElementById('input-left').value;
            const fontVal   = document.getElementById('input-font').value;
            
            const line1Val  = document.getElementById("input-space-lines-1").value;
            const line2Val  = document.getElementById("input-space-lines-2").value;
            const blockVal  = document.getElementById("input-space-block").value;

            
            document.documentElement.style.setProperty('--top', topVal + 'mm');
            document.documentElement.style.setProperty('--left', leftVal + 'mm');
            document.documentElement.style.setProperty('--font-size', fontVal + 'px');
            
            document.getElementById('val-top').innerText = topVal + 'mm';
            document.getElementById('val-left').innerText = leftVal + 'mm';
            document.getElementById('val-font').innerText = fontVal + 'px';

            document.documentElement.style.setProperty("--line-space-1", line1Val + "mm");
            document.documentElement.style.setProperty("--line-space-2", line2Val + "mm");
            document.documentElement.style.setProperty("--block-space",  blockVal + "mm");

            document.getElementById('val-lines-1').innerText = line1Val + 'mm';
            document.getElementById('val-lines-2').innerText = line2Val + 'mm';
            document.getElementById('val-block').innerText  = blockVal + 'mm';
        }
        
        function limparDados() {
            document.getElementById('upload-excel').value = '';
            fileLabel.innerText = "Selecionar planilha";
            container.innerHTML = htmlExemplo;
            atualizar();
        }
        
        // Geração e Download automático da planilha modelo usando a própria biblioteca XLSX
        function baixarModeloExcel() {
            const cabecalhos = [["NOME", "ENDEREÇO", "CIDADE_UF", "CEP", "AUTO_INFRACAO", "OFICIO"]];
            const dadosExemplo = [
                ["João da Silva Exemplo", "Av. Duque de Caxias, 123 - Ribeira", "Natal/RN", "59012-000", "001234/2026", "045/2026"],
            ];
            const matrizFinal = cabecalhos.concat(dadosExemplo);
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(matrizFinal);
            XLSX.utils.book_append_sheet(wb, ws, "Modelo_AR");
            XLSX.writeFile(wb, "modelo_planilha_AR.xlsx");
        }
        
        limparDados();
        
        document.getElementById('upload-excel').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            fileLabel.innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = new Uint8Array(evt.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const aba = workbook.Sheets[workbook.SheetNames[0]];
                    const matriz = XLSX.utils.sheet_to_json(aba, { header: 1 });
                    if (matriz.length <= 1) return;
                    
                    container.innerHTML = '';
                    for (let i = 1; i < matriz.length; i++) {
                        const column = matriz[i];
                        if (column.length === 0) continue;
                        
                        const NOME      = column[0] || '';
                        const ENDERECO  = column[1] || '';
                        const CID_CEP   = (column[2] || '') + (column[3] ? " - CEP: " + column[3] : "");

                        const AUTO      = column[4] || '';
                        const OFICIO    = column[5] || '';
                        
                        const autos = AUTO
                            .split(";")
                            .map(item => item.trim())
                            .filter(item => item !== "")
                            .join("<br>");

                        const oficios = OFICIO
                            .split(";")
                            .map(item => item.trim())
                            .filter(item => item !== "")
                            .join("<br>");
                        
                        
                        container.innerHTML += `
                            <div class="ar-container">
                                <div class="ar-meta">Documento #${i}</div>
                                <div class="ar-card">
                                    <div class="bloco-texto">
                                        <div class="bloco-endereco">
                                            <div class="nome">
                                                ${NOME}
                                            </div>
                                            <div class="endereco">
                                                ${ENDERECO}
                                            </div>
                                            <div class="cep">
                                                ${CID_CEP}
                                            </div>
                                        </div>
                                        <div class="bloco-infracao">
                                            <div class="infracao">
                                                <div class="campo">
                                                    <b>Auto de Infração nº:</b>
                                                </div>
                                                <div class="valores">
                                                    ${autos}
                                                </div>
                                            </div>
                                            <div class="oficio">
                                                <div class="campo">
                                                    <b>Ofício GAC/CGD nº:</b>
                                                </div>
                                                <div class="valores">
                                                    ${oficios}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    atualizar(); 
                    sidebar.classList.remove('aberto');
                    toggleText.innerText = "Configurações & Painel";
                } catch (err) { alert("Erro ao ler planilha."); }
            };
            reader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
